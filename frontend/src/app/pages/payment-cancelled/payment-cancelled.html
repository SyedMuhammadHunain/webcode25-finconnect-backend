<div class="status-page">
    <div class="status-card">
        <!-- Cancel Icon -->
        <div class="status-icon-wrap status-cancel-wrap">
            <div class="status-icon-ring"></div>
            <i class="pi pi-times status-icon"></i>
        </div>

        <!-- Content -->
        <div class="status-content">
            <h2 class="status-title">Payment Cancelled</h2>
            <p class="status-subtitle">
                No worries — you haven't been charged.<br>
                You can try again whenever you're ready.
            </p>

            <!-- Info Box -->
            <div class="status-info-box status-info-cancel">
                <i class="pi pi-shield"></i>
                <span>Your account is safe. No charges were made.</span>
            </div>
        </div>

        <!-- Actions -->
        <div class="status-actions">
            <p-button label="Try Again" icon="pi pi-refresh" (onClick)="retrySubscription()"
                styleClass="status-btn-primary">
            </p-button>
            <p-button label="Go Home" icon="pi pi-home" [outlined]="true" (onClick)="goHome()"
                styleClass="status-btn-ghost">
            </p-button>
        </div>
    </div>
</div>
