<div class="subscription-page">
    <!-- Page Header -->
    <div class="sub-header">
        <div class="sub-header-badge">
            <i class="pi pi-bolt" style="font-size: 10px;"></i>
            Plans & Pricing
        </div>
        <h1 class="sub-title">Choose Your Plan</h1>
        <p class="sub-subtitle">Scale your financial operations with the right tier for your business</p>
    </div>

    <!-- Plans Grid -->
    <div class="plans-grid">
        <div class="plan-card" *ngFor="let plan of plans" [class.plan-card-premium]="plan.type === 'premium'">

            <!-- Premium Badge -->
            <div class="plan-popular-badge" *ngIf="plan.type === 'premium'">
                <i class="pi pi-star-fill"></i>
                Most Popular
            </div>

            <!-- Plan Icon -->
            <div class="plan-icon-wrapper" [class.plan-icon-premium]="plan.type === 'premium'">
                <i [class]="plan.icon"></i>
            </div>

            <!-- Plan Meta -->
            <div class="plan-label">{{ plan.label }}</div>

            <!-- Price -->
            <div class="plan-price">
                <span class="plan-currency">$</span>
                <span class="plan-amount">{{ plan.price }}</span>
                <span class="plan-period">/mo</span>
            </div>

            <!-- Divider -->
            <div class="plan-divider"></div>

            <!-- Features -->
            <ul class="plan-features">
                <li *ngFor="let feature of plan.features">
                    <i class="pi pi-check-circle feature-check"></i>
                    <span>{{ feature }}</span>
                </li>
            </ul>

            <!-- CTA -->
            <app-loading (click)="onSubscribe(plan)" [loading]="isLoading()" [label]="'Get ' + plan.label"
                [icon]="'pi pi-arrow-right'" [disabled]="isLoading()">
            </app-loading>
        </div>
    </div>

    <!-- Trust badges -->
    <div class="trust-row">
        <div class="trust-item">
            <i class="pi pi-shield"></i>
            <span>Secure Payments via Stripe</span>
        </div>
        <div class="trust-item">
            <i class="pi pi-refresh"></i>
            <span>Cancel Anytime</span>
        </div>
        <div class="trust-item">
            <i class="pi pi-lock"></i>
            <span>256-bit SSL Encrypted</span>
        </div>
    </div>
</div>
