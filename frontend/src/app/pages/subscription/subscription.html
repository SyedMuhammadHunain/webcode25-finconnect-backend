<div class="subscription-container">
    <div class="header">
        <h1>Choose Your Plan</h1>
        <p>Select the best option for your business needs</p>
    </div>

    <div class="messages">
        <p-message *ngIf="errorMessage()" severity="error" [text]="errorMessage() || ''"></p-message>
        <p-message *ngIf="successMessage()" severity="success" [text]="successMessage() || ''"></p-message>
    </div>

    <div class="plans-grid">
        <p-card *ngFor="let plan of plans" [header]="plan.label" class="plan-card"
            [class.premium-card]="plan.type === 'premium'">
            <ng-template #subtitle>
                <div class="price-tag">
                    <span class="currency">$</span>
                    <span class="amount">{{ plan.price }}</span>
                    <span class="period">/month</span>
                </div>
            </ng-template>

            <div class="plan-content">
                <div class="icon-wrapper">
                    <i [class]="plan.icon"></i>
                </div>

                <ul class="features-list">
                    <li *ngFor="let feature of plan.features">
                        <i class="pi pi-check-circle"></i>
                        {{ feature }}
                    </li>
                </ul>

                <app-loading (click)="onSubscribe(plan)" [loading]="isLoading()" [label]="'Choose ' + plan.label"
                    [icon]="'pi pi-chevron-right'" [disabled]="isLoading()">
                </app-loading>
            </div>
        </p-card>
    </div>
</div>
