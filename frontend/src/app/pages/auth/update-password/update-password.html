<p-card header="Update Password">
    <ng-template #subtitle>
        Set a strong new password for your account
    </ng-template>

    <p-message *ngIf="errorMessage()" severity="error" [text]="errorMessage()"></p-message>
    <p-message *ngIf="successMessage()" severity="success" [text]="successMessage()"></p-message>

    <form [formGroup]="updatePasswordForm" (ngSubmit)="onSubmit()">
        <div>
            <p-floatlabel>
                <p-password id="newPassword" formControlName="newPassword" [toggleMask]="true"
                    promptLabel="Choose a strong password" weakLabel="Too simple" mediumLabel="Average complexity"
                    strongLabel="Complex password"></p-password>
                <label for="newPassword">New Password</label>
            </p-floatlabel>
            <div
                *ngIf="updatePasswordForm.get('newPassword')?.invalid && updatePasswordForm.get('newPassword')?.touched">
                <small *ngIf="updatePasswordForm.get('newPassword')?.hasError('required')">Password is required.</small>
                <small *ngIf="updatePasswordForm.get('newPassword')?.hasError('minlength')">Must be at least 6
                    characters.</small>
            </div>
        </div>

        <div>
            <p-button type="submit" [loading]="isLoading()" label="Update Password" icon="pi pi-check"
                [disabled]="updatePasswordForm.invalid || isLoading()"></p-button>
        </div>
    </form>

    <ng-template #footer>
        <div>
            <a routerLink="/login">Back to Login</a>
        </div>
    </ng-template>
</p-card>
