<div class="auth-card">
    <!-- Brand Header -->
    <div class="auth-brand">
        <img src="apple-touch-icon.png" class="auth-logo" alt="FinConnect" />
        <h2 class="auth-brand-name">FinConnect</h2>
        <p class="auth-brand-sub">Update your password</p>
    </div>

    <div class="auth-divider"></div>

    <!-- Form -->
    <form [formGroup]="updatePasswordForm" (ngSubmit)="onSubmit()" class="auth-form">

        <!-- New Password -->
        <div class="auth-form-group">
            <label for="newPassword">
                <i class="pi pi-lock form-label-icon"></i>
                New Password
            </label>
            <div class="input-wrapper">
                <p-password id="newPassword" formControlName="newPassword" [toggleMask]="true"
                    promptLabel="Choose a strong password" weakLabel="Too simple" mediumLabel="Average complexity"
                    strongLabel="Complex password" placeholder="Enter your new password" styleClass="w-full"></p-password>
            </div>
            <div
                *ngIf="updatePasswordForm.get('newPassword')?.invalid && updatePasswordForm.get('newPassword')?.touched">
                <small class="field-error" *ngIf="updatePasswordForm.get('newPassword')?.hasError('required')">
                    <i class="pi pi-exclamation-circle"></i> Password is required.
                </small>
                <small class="field-error" *ngIf="updatePasswordForm.get('newPassword')?.hasError('minlength')">
                    <i class="pi pi-exclamation-circle"></i> Must be at least 6 characters.
                </small>
            </div>
        </div>

        <!-- Submit -->
        <app-loading [loading]="isLoading()" label="Update Password" icon="pi pi-check"
            [disabled]="updatePasswordForm.invalid || isLoading()">
        </app-loading>
    </form>

    <!-- Footer Links -->
    <div class="auth-footer">
        <a routerLink="/login"><strong>← Back to Login</strong></a>
    </div>
</div>
