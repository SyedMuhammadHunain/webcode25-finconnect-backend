<div class="auth-card">

    <div class="auth-divider"></div>

    <!-- Form -->
    <form [formGroup]="signupForm" (ngSubmit)="onSubmit()" class="auth-form">

        <!-- Username -->
        <div class="auth-form-group">
            <label for="username">
                <i class="pi pi-user form-label-icon"></i>
                Username
            </label>
            <p-floatlabel>
                <input pInputText id="username" formControlName="username" type="text" />
                <label for="username">Choose a username</label>
            </p-floatlabel>
            <div *ngIf="signupForm.get('username')?.invalid && signupForm.get('username')?.touched">
                <small class="field-error" *ngIf="signupForm.get('username')?.hasError('required')">
                    <i class="pi pi-exclamation-circle"></i> Username is required.
                </small>
                <small class="field-error" *ngIf="signupForm.get('username')?.hasError('minlength')">
                    <i class="pi pi-exclamation-circle"></i> Must be at least 3 characters.
                </small>
            </div>
        </div>

        <!-- Email -->
        <div class="auth-form-group">
            <label for="email">
                <i class="pi pi-envelope form-label-icon"></i>
                Email Address
            </label>
            <p-floatlabel>
                <input pInputText id="email" formControlName="email" type="email" />
                <label for="email">Enter your email</label>
            </p-floatlabel>
            <div *ngIf="signupForm.get('email')?.invalid && signupForm.get('email')?.touched">
                <small class="field-error" *ngIf="signupForm.get('email')?.hasError('required')">
                    <i class="pi pi-exclamation-circle"></i> Email is required.
                </small>
                <small class="field-error" *ngIf="signupForm.get('email')?.hasError('email')">
                    <i class="pi pi-exclamation-circle"></i> Invalid email format.
                </small>
            </div>
        </div>

        <!-- Password -->
        <div class="auth-form-group">
            <label for="password">
                <i class="pi pi-lock form-label-icon"></i>
                Password
            </label>
            <p-floatlabel>
                <p-password id="password" formControlName="password" [toggleMask]="true" promptLabel="Choose a password"
                    weakLabel="Too simple" mediumLabel="Average complexity" strongLabel="Complex password">
                </p-password>
                <label for="password">Create a password</label>
            </p-floatlabel>
            <div *ngIf="signupForm.get('password')?.invalid && signupForm.get('password')?.touched">
                <small class="field-error" *ngIf="signupForm.get('password')?.hasError('required')">
                    <i class="pi pi-exclamation-circle"></i> Password is required.
                </small>
                <small class="field-error" *ngIf="signupForm.get('password')?.hasError('minlength')">
                    <i class="pi pi-exclamation-circle"></i> Must be at least 6 characters.
                </small>
            </div>
        </div>

        <!-- Submit -->
        <app-loading [loading]="isLoading()" label="Create Account" icon="pi pi-user-plus"
            [disabled]="signupForm.invalid || isLoading()">
        </app-loading>
    </form>

    <!-- Footer Links -->
    <div class="auth-footer">
        <a routerLink="/login-verified">Already have an account? <strong>Sign in</strong></a>
        <a routerLink="/login">New to FinConnect? Sign in with OTP</a>
    </div>
</div>
