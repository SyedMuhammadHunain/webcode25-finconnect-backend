<p-card header="Create an Account">
    <ng-template #subtitle>
        Sign up to get started
    </ng-template>

    <p-message *ngIf="errorMessage()" severity="error" [text]="errorMessage() || ''"></p-message>
    <p-message *ngIf="successMessage()" severity="success" [text]="successMessage() || ''"></p-message>

    <form [formGroup]="signupForm" (ngSubmit)="onSubmit()">
        <div>
            <p-floatlabel>
                <input pInputText id="username" formControlName="username" type="text" />
                <label for="username">Username</label>
            </p-floatlabel>
            <div *ngIf="signupForm.get('username')?.invalid && signupForm.get('username')?.touched">
                <small *ngIf="signupForm.get('username')?.hasError('required')">Username is required.</small>
                <small *ngIf="signupForm.get('username')?.hasError('minlength')">Must be at least 3 characters.</small>
            </div>
        </div>

        <div>
            <p-floatlabel>
                <input pInputText id="email" formControlName="email" type="email" />
                <label for="email">Email</label>
            </p-floatlabel>
            <div *ngIf="signupForm.get('email')?.invalid && signupForm.get('email')?.touched">
                <small *ngIf="signupForm.get('email')?.hasError('required')">Email is required.</small>
                <small *ngIf="signupForm.get('email')?.hasError('email')">Invalid email format.</small>
            </div>
        </div>

        <div>
            <p-floatlabel>
                <p-password id="password" formControlName="password" [toggleMask]="true" promptLabel="Choose a password"
                    weakLabel="Too simple" mediumLabel="Average complexity" strongLabel="Complex password"></p-password>
                <label for="password">Password</label>
            </p-floatlabel>
            <div *ngIf="signupForm.get('password')?.invalid && signupForm.get('password')?.touched">
                <small *ngIf="signupForm.get('password')?.hasError('required')">Password is required.</small>
                <small *ngIf="signupForm.get('password')?.hasError('minlength')">Must be at least 6 characters.</small>
            </div>
        </div>

        <app-loading [loading]="isLoading()" label="Sign Up" icon="pi pi-user-plus"
            [disabled]="signupForm.invalid || isLoading()"></app-loading>
    </form>

    <ng-template #footer>
        <div>
            <a routerLink="/login">Already have an account? Sign in</a>
        </div>
    </ng-template>
</p-card>
