<p-card header="Forgot Password">
    <ng-template #subtitle>
        Enter your email to receive a password reset link
    </ng-template>

    <p-message *ngIf="errorMessage()" severity="error" [text]="errorMessage()"></p-message>
    <p-message *ngIf="successMessage()" severity="success" [text]="successMessage()"></p-message>

    <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()">
        <div>
            <p-floatlabel>
                <input pInputText id="email" formControlName="email" type="email" />
                <label for="email">Email address</label>
            </p-floatlabel>
            <div *ngIf="forgotPasswordForm.get('email')?.invalid && forgotPasswordForm.get('email')?.touched">
                <small *ngIf="forgotPasswordForm.get('email')?.hasError('required')">Email is required.</small>
                <small *ngIf="forgotPasswordForm.get('email')?.hasError('email')">Invalid email format.</small>
            </div>
        </div>

        <div>
            <p-button type="submit" [loading]="isLoading()" label="Send Reset Link" icon="pi pi-envelope"
                [disabled]="forgotPasswordForm.invalid || isLoading()"></p-button>
        </div>
    </form>

    <ng-template #footer>
        <div>
            <a routerLink="/login">Back to Login</a>
        </div>
    </ng-template>
</p-card>
