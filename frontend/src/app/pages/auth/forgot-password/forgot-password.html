<div class="auth-card">
    <!-- Brand Header -->
    <div class="auth-brand">
        <div class="auth-brand-icon">
            <i class="pi pi-bolt"></i>
        </div>
        <h2 class="auth-brand-name">FinConnect</h2>
        <p class="auth-brand-sub">Reset your password</p>
    </div>

    <div class="auth-divider"></div>

    <!-- Form -->
    <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()" class="auth-form">

        <!-- Email -->
        <div class="auth-form-group">
            <label for="email">
                <i class="pi pi-envelope form-label-icon"></i>
                Email Address
            </label>
            <p-floatlabel>
                <input pInputText id="email" formControlName="email" type="email" />
                <label for="email">Enter your registered email</label>
            </p-floatlabel>
            <div *ngIf="forgotPasswordForm.get('email')?.invalid && forgotPasswordForm.get('email')?.touched">
                <small class="field-error" *ngIf="forgotPasswordForm.get('email')?.hasError('required')">
                    <i class="pi pi-exclamation-circle"></i> Email is required.
                </small>
                <small class="field-error" *ngIf="forgotPasswordForm.get('email')?.hasError('email')">
                    <i class="pi pi-exclamation-circle"></i> Invalid email format.
                </small>
            </div>
        </div>

        <!-- Submit -->
        <app-loading [loading]="isLoading()" label="Send Reset Link" icon="pi pi-envelope"
            [disabled]="forgotPasswordForm.invalid || isLoading()">
        </app-loading>
    </form>

    <!-- Footer Links -->
    <div class="auth-footer">
        <a routerLink="/login"><strong>← Back to Login</strong></a>
    </div>
</div>
