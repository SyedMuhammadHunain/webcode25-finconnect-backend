<div class="auth-card">
    <!-- Brand Header -->
    <div class="auth-brand">
        <img src="apple-touch-icon.png" class="auth-logo" alt="FinConnect" />
        <h2 class="auth-brand-name">FinConnect</h2>
        <p class="auth-brand-sub">Sign in without OTP</p>
    </div>

    <div class="auth-divider"></div>

    <!-- Form -->
    <form [formGroup]="loginVerifiedForm" (ngSubmit)="onSubmit()" class="auth-form">

        <!-- Email -->
        <div class="auth-form-group">
            <label for="lv-email">
                <i class="pi pi-envelope form-label-icon"></i>
                Email Address
            </label>
            <div class="input-wrapper">
                <input pInputText id="lv-email" formControlName="email" type="email"  placeholder="Enter your email" class="w-full" />
            </div>
            <div *ngIf="loginVerifiedForm.get('email')?.invalid && loginVerifiedForm.get('email')?.touched">
                <p-message severity="error" *ngIf="loginVerifiedForm.get('email')?.hasError('required')"
                    text="Email is required." styleClass="field-error-msg" />
                <p-message severity="error" *ngIf="loginVerifiedForm.get('email')?.hasError('email')"
                    text="Invalid email format." styleClass="field-error-msg" />
            </div>
        </div>

        <!-- Password -->
        <div class="auth-form-group">
            <label for="lv-password">
                <i class="pi pi-lock form-label-icon"></i>
                Password
            </label>
            <div class="input-wrapper">
                <p-password id="lv-password" formControlName="password" [feedback]="false" [toggleMask]="true" placeholder="Enter your password" styleClass="w-full"></p-password>
            </div>
            <div *ngIf="loginVerifiedForm.get('password')?.invalid && loginVerifiedForm.get('password')?.touched">
                <p-message severity="error" *ngIf="loginVerifiedForm.get('password')?.hasError('required')"
                    text="Password is required." styleClass="field-error-msg" />
            </div>
        </div>

        <!-- Submit -->
        <app-loading [loading]="isLoading()" label="Sign In" icon="pi pi-sign-in"
            [disabled]="loginVerifiedForm.invalid || isLoading()">
        </app-loading>
    </form>

    <!-- Footer Links -->
    <div class="auth-footer">
        <div class="footer-links">
            <a routerLink="/login">Sign in with OTP</a>
            <span class="footer-sep">·</span>
            <a routerLink="/forgot-password">Forgot password?</a>
        </div>
        <div class="footer-signup">
            Don't have an account?
            <a routerLink="/signup"><strong>Create one</strong></a>
        </div>
    </div>
</div>
