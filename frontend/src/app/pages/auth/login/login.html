<div class="auth-card">
    <!-- Brand Header -->
    <div class="auth-brand">
        <div class="auth-brand-icon">
            <i class="pi pi-bolt"></i>
        </div>
        <div class="auth-brand-name">FinConnect</div>
        <div class="auth-brand-sub">Sign in with your OTP verification code</div>
    </div>

    <div class="auth-divider"></div>

    <!-- Form -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">

        <!-- Email -->
        <div class="auth-form-group">
            <label for="login-email">
                <i class="pi pi-envelope form-label-icon"></i>
                Email Address
            </label>
            <p-floatlabel>
                <input pInputText id="login-email" formControlName="email" type="email" />
                <label for="login-email">Enter your email</label>
            </p-floatlabel>
            <div *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
                <p-message severity="error" *ngIf="loginForm.get('email')?.hasError('required')"
                    text="Email is required." styleClass="field-error-msg" />
                <p-message severity="error" *ngIf="loginForm.get('email')?.hasError('email')"
                    text="Invalid email format." styleClass="field-error-msg" />
            </div>
        </div>

        <!-- Password -->
        <div class="auth-form-group">
            <label for="login-password">
                <i class="pi pi-lock form-label-icon"></i>
                Password
            </label>
            <p-floatlabel>
                <p-password id="login-password" formControlName="password" [feedback]="false"
                    [toggleMask]="true"></p-password>
                <label for="login-password">Enter your password</label>
            </p-floatlabel>
            <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
                <p-message severity="error" *ngIf="loginForm.get('password')?.hasError('required')"
                    text="Password is required." styleClass="field-error-msg" />
            </div>
        </div>

        <!-- OTP Code -->
        <div class="auth-form-group">
            <label for="login-code">
                <i class="pi pi-key form-label-icon"></i>
                OTP Code
                <a routerLink="/resend-otp" class="resend-link">Resend OTP</a>
            </label>
            <p-floatlabel>
                <input pInputText id="login-code" formControlName="code" type="text" />
                <label for="login-code">Enter your OTP from email</label>
            </p-floatlabel>
            <div *ngIf="loginForm.get('code')?.invalid && loginForm.get('code')?.touched">
                <p-message severity="error" *ngIf="loginForm.get('code')?.hasError('required')"
                    text="OTP Code is required." styleClass="field-error-msg" />
            </div>
        </div>

        <!-- Submit -->
        <app-loading [loading]="isLoading()" label="Sign In" icon="pi pi-sign-in"
            [disabled]="loginForm.invalid || isLoading()">
        </app-loading>
    </form>

    <!-- Footer Links -->
    <div class="auth-footer">
        <a routerLink="/login-verified">Already verified? <strong>Sign in without OTP</strong></a>
        <div class="footer-row">
            <a routerLink="/signup">New here? Create account</a>
            <span class="footer-sep">·</span>
            <a routerLink="/forgot-password">Forgot password?</a>
        </div>
    </div>
</div>
