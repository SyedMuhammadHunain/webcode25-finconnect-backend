<div class="auth-card">
    <!-- Brand Header -->
    <div class="auth-brand">
        <div class="auth-brand-icon">
            <i class="pi pi-bolt"></i>
        </div>
        <div class="auth-brand-name">FinConnect</div>
        <div class="auth-brand-sub">Welcome back! Sign in to your account</div>
    </div>

    <div class="auth-divider"></div>

    <!-- Form -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">

        <!-- Email -->
        <div class="auth-form-group">
            <label for="email">
                <i class="pi pi-envelope form-label-icon"></i>
                Email Address
            </label>
            <p-floatlabel>
                <input pInputText id="email" formControlName="email" type="email" />
                <label for="email">Enter your email</label>
            </p-floatlabel>
            <div *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
                <small class="field-error" *ngIf="loginForm.get('email')?.hasError('required')">
                    <i class="pi pi-exclamation-circle"></i> Email is required.
                </small>
                <small class="field-error" *ngIf="loginForm.get('email')?.hasError('email')">
                    <i class="pi pi-exclamation-circle"></i> Invalid email format.
                </small>
            </div>
        </div>

        <!-- Password -->
        <div class="auth-form-group">
            <label for="password">
                <i class="pi pi-lock form-label-icon"></i>
                Password
            </label>
            <p-floatlabel>
                <p-password id="password" formControlName="password" [feedback]="false"
                    [toggleMask]="true"></p-password>
                <label for="password">Enter your password</label>
            </p-floatlabel>
            <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
                <small class="field-error" *ngIf="loginForm.get('password')?.hasError('required')">
                    <i class="pi pi-exclamation-circle"></i> Password is required.
                </small>
            </div>
        </div>

        <!-- OTP Code -->
        <div class="auth-form-group">
            <label for="code">
                <i class="pi pi-key form-label-icon"></i>
                OTP Code
            </label>
            <p-floatlabel>
                <input pInputText id="code" formControlName="code" type="text" />
                <label for="code">Enter your OTP</label>
            </p-floatlabel>
            <div *ngIf="loginForm.get('code')?.invalid && loginForm.get('code')?.touched">
                <small class="field-error" *ngIf="loginForm.get('code')?.hasError('required')">
                    <i class="pi pi-exclamation-circle"></i> OTP Code is required.
                </small>
            </div>
        </div>

        <!-- Submit -->
        <app-loading [loading]="isLoading()" label="Sign In" icon="pi pi-sign-in"
            [disabled]="loginForm.invalid || isLoading()">
        </app-loading>
    </form>

    <!-- Footer Links -->
    <div class="auth-footer">
        <a routerLink="/signup">Don't have an account? <strong>Sign up</strong></a>
        <a routerLink="/forgot-password">Forgot your password?</a>
    </div>
</div>
