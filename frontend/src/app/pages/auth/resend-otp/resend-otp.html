<div class="auth-card">
    <!-- Brand Header -->
    <div class="auth-brand">
        <img src="apple-touch-icon.png" class="auth-logo" alt="FinConnect" />
        <h2 class="auth-brand-name">FinConnect</h2>
        <p class="auth-brand-sub">Resend your OTP code</p>
    </div>

    <div class="auth-divider"></div>

    <!-- Success State -->
    <div *ngIf="successMessage" class="success-banner">
        <i class="pi pi-check-circle"></i>
        <span>{{ successMessage }}</span>
    </div>

    <!-- Form -->
    <form [formGroup]="resendOtpForm" (ngSubmit)="onSubmit()" class="auth-form" *ngIf="!successMessage">

        <!-- Email -->
        <div class="auth-form-group">
            <label for="ro-email">
                <i class="pi pi-envelope form-label-icon"></i>
                Email Address
            </label>
            <div class="input-wrapper">
                <input pInputText id="ro-email" formControlName="email" type="email"  placeholder="Enter your email address" class="w-full" />
            </div>
            <div *ngIf="resendOtpForm.get('email')?.invalid && resendOtpForm.get('email')?.touched">
                <p-message severity="error" *ngIf="resendOtpForm.get('email')?.hasError('required')"
                    text="Email is required." styleClass="field-error-msg" />
                <p-message severity="error" *ngIf="resendOtpForm.get('email')?.hasError('email')"
                    text="Invalid email format." styleClass="field-error-msg" />
            </div>
        </div>

        <!-- Submit -->
        <app-loading [loading]="isLoading()" label="Resend OTP Code" icon="pi pi-send"
            [disabled]="resendOtpForm.invalid || isLoading()">
        </app-loading>
    </form>

    <!-- Footer Links -->
    <div class="auth-footer">
        <a routerLink="/login">← Back to Login with OTP</a>
        <a routerLink="/login-verified">Sign in without OTP</a>
    </div>
</div>
