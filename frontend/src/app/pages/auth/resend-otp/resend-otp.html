<p-card header="Resend OTP">
    <ng-template #subtitle>
        Didn't receive the code? We'll send it again.
    </ng-template>

    <p-message *ngIf="errorMessage()" severity="error" [text]="errorMessage() || ''"></p-message>
    <p-message *ngIf="successMessage()" severity="success" [text]="successMessage() || ''"></p-message>

    <form [formGroup]="resendOtpForm" (ngSubmit)="onSubmit()">
        <div>
            <p-floatlabel>
                <input pInputText id="email" formControlName="email" type="email" />
                <label for="email">Email address</label>
            </p-floatlabel>
            <div *ngIf="resendOtpForm.get('email')?.invalid && resendOtpForm.get('email')?.touched">
                <small *ngIf="resendOtpForm.get('email')?.hasError('required')">Email is required.</small>
                <small *ngIf="resendOtpForm.get('email')?.hasError('email')">Invalid email format.</small>
            </div>
        </div>

        <div>
            <p-button type="submit" [loading]="isLoading()" label="Resend OTP" icon="pi pi-send"
                [disabled]="resendOtpForm.invalid || isLoading()"></p-button>
        </div>
    </form>

    <ng-template #footer>
        <div>
            <a routerLink="/login">Back to Login</a>
        </div>
    </ng-template>
</p-card>
