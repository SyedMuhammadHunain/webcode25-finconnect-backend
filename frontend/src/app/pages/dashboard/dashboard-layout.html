<div class="dashboard-layout">
    <!-- Sidebar Overlay (mobile) -->
    <div class="sidebar-overlay" [class.active]="sidebarOpen" (click)="closeSidebar()"></div>

    <!-- Sidebar -->
    <aside class="sidebar" [class.sidebar-open]="sidebarOpen">
        <!-- Brand -->
        <div class="sidebar-brand">
            <img src="favicon-96x96.png" class="brand-logo" alt="FinConnect" />
            <span class="brand-name">FinConnect</span>
        </div>

        <div class="sidebar-divider"></div>

        <!-- Navigation -->
        <nav class="sidebar-nav">
            <p class="nav-section-label">Main Menu</p>
            <ul>
                <li>
                    <a routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}"
                        (click)="closeSidebar()">
                        <i class="pi pi-home nav-icon"></i>
                        <span>Overview</span>
                    </a>
                </li>
                <li>
                    <a routerLink="/dashboard/transactions" routerLinkActive="active" (click)="closeSidebar()">
                        <i class="pi pi-list nav-icon"></i>
                        <span>Transactions</span>
                    </a>
                </li>
                <li>
                    <a routerLink="/dashboard/invoices" routerLinkActive="active" (click)="closeSidebar()">
                        <i class="pi pi-file nav-icon"></i>
                        <span>Invoices</span>
                    </a>
                </li>
                <li>
                    <a routerLink="/dashboard/transfer" routerLinkActive="active" (click)="closeSidebar()">
                        <i class="pi pi-send nav-icon"></i>
                        <span>Transfer</span>
                    </a>
                </li>
            </ul>

            <p class="nav-section-label" style="margin-top: 24px;">Account</p>
            <ul>
                <li>
                    <a routerLink="/subscription" routerLinkActive="active" (click)="closeSidebar()">
                        <i class="pi pi-star nav-icon"></i>
                        <span>Subscription</span>
                    </a>
                </li>
            </ul>
        </nav>

        <!-- Sidebar Footer / User Account -->
        <div class="sidebar-footer">
            <div class="sidebar-divider"></div>

            <!-- User Popover -->
            <div *ngIf="userPopoverOpen" class="popover-overlay" (click)="closeUserPopover()"></div>
            <div style="position: relative;">
                <div class="user-popover" *ngIf="userPopoverOpen">
                    <div class="popover-header">
                        <div class="popover-avatar">
                            <i class="pi pi-user"></i>
                        </div>
                        <div class="popover-user-info">
                            <span class="popover-name">{{ userName }}</span>
                            <span class="popover-email">{{ userEmail || 'No email set' }}</span>
                        </div>
                    </div>
                    <div class="popover-menu">
                        <button class="popover-item">
                            <i class="pi pi-user-edit"></i>
                            <span>Edit Profile</span>
                        </button>
                        <button class="popover-item">
                            <i class="pi pi-image"></i>
                            <span>Change Avatar</span>
                        </button>
                        <button class="popover-item">
                            <i class="pi pi-cog"></i>
                            <span>Settings</span>
                        </button>
                        <div class="popover-divider"></div>
                        <button class="popover-item danger" (click)="logout()">
                            <i class="pi pi-sign-out"></i>
                            <span>Log Out</span>
                        </button>
                    </div>
                </div>

                <div class="user-card" (click)="toggleUserPopover()">
                    <div class="user-avatar">
                        <i class="pi pi-user"></i>
                    </div>
                    <div class="user-info">
                        <span class="user-name">{{ userName }}</span>
                        <span class="user-role">Pro Member</span>
                    </div>
                    <i class="pi pi-chevron-up user-card-chevron"></i>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="content">
        <!-- Top Bar -->
        <header class="topbar">
            <div class="topbar-left">
                <button class="mobile-menu-btn" (click)="toggleSidebar()">
                    <i class="pi pi-bars"></i>
                </button>
                <div class="breadcrumb-dot"></div>
                <span class="topbar-title">Dashboard</span>
            </div>
            <div class="topbar-right">
                <div class="topbar-time">{{ currentTime }}</div>
            </div>
        </header>
        <div class="content-body">
            <router-outlet></router-outlet>
        </div>
    </main>
</div>
